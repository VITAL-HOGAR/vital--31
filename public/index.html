<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Hogar Pro IPS - Siglo 31</title>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --primary: #22c55e; --danger: #ef4444; --warning: #f59e0b; --text-main: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .hidden { display: none !important; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .logo-area img { height: 50px; }
        
        /* Módulos y Tarjetas */
        .module-section { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        /* Inputs y Botones */
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        button.secondary { background: #334155; }
        button.mic-btn { background: var(--warning); color: black; width: auto; margin-left: 10px; }
        
        /* Checklist de Actividades */
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 15px; }
        .act-btn { background: #334155; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
        .act-btn.active { background: var(--primary); border-color: white; }
        .act-time { font-size: 0.7rem; display: block; margin-top: 5px; opacity: 0.8; }

        /* Semáforo SpO2 */
        .spo2-indicator { display: inline-block; width: 15px; height: 15px; border-radius: 50%; margin-right: 10px; }
        .status-green { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .status-red { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        /* Login */
        .login-wrapper { display: flex; justify-content: center; align-items: center; height: 90vh; }
        .login-card { background: var(--card-bg); padding: 2rem; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen" class="login-wrapper">
        <div class="login-card">
            <img src="https://i.imgur.com/01YZxey.jpeg" style="height: 80px;">
            <h2>Vital Hogar Pro IPS</h2>
            <input type="email" id="loginEmail" placeholder="Email" value="admin@vitalhogar.com">
            <input type="password" id="loginPass" placeholder="Contraseña" value="123456">
            <button onclick="handleLogin()">Ingresar</button>
            <p id="loginMsg" style="color: var(--danger);"></p>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="mainApp" class="app-container hidden">
        <header>
            <div class="logo-area">
                <img src="https://i.imgur.com/01YZxey.jpeg">
                <div><h1>VITAL HOGAR PRO</h1><small>Cuidados Domiciliarios Siglo 31</small></div>
            </div>
            <button onclick="logout()" style="background: var(--danger); width: auto;">Salir</button>
        </header>

        <!-- MÓDULO: INICIO DE TURNO Y ACTIVIDADES -->
        <div class="module-section">
            <h3>📋 Recepción de Paciente y Turno</h3>
            
            <!-- Selección de Ciudad para Lógica de Altitud -->
            <div class="grid-2">
                <div>
                    <label>Ciudad del Paciente (Lógica SpO2):</label>
                    <select id="patientCity" onchange="updateSpo2Logic()">
                        <option value="97">Cúcuta / Costa (Nivel 1)</option>
                        <option value="96">Cali / Bga (Nivel 2)</option>
                        <option value="95">Medellín (Nivel 3)</option>
                        <option value="93">Bogotá (Nivel 4)</option>
                    </select>
                </div>
                <div>
                    <label>Duración del Turno:</label>
                    <select id="shiftDuration">
                        <option value="6">6 Horas</option>
                        <option value="8">8 Horas</option>
                        <option value="12">12 Horas</option>
                        <option value="24">24 Horas</option>
                    </select>
                </div>
            </div>

            <!-- Reporte SBAR por Voz -->
            <label>Reporte de Recepción (SBAR) - Usa el micrófono 🎤:</label>
            <div style="display: flex;">
                <textarea id="sbarNotes" rows="3" placeholder="Ej: Paciente consciente, recibe cama limpia, sin novedades..."></textarea>
                <button class="mic-btn" onclick="startDictation()"><i class="fas fa-microphone"></i></button>
            </div>

            <!-- Checklist de Actividades Rápidas -->
            <h4>⚡ Registro Rápido de Actividades</h4>
            <div class="activity-grid">
                <div class="act-btn" onclick="registerActivity(this, 'BAÑO')">🛁 Baño<i class="act-time"></i></div>
                <div class="act-btn" onclick="registerActivity(this, 'TENDIDO_CAMA')">🛏️ Tendido Cama<i class="act-time"></i></div>
                <div class="act-btn" onclick="registerActivity(this, 'ALIMENTACION')">🍽️ Alimentación<i class="act-time"></i></div>
                <div class="act-btn" onclick="registerActivity(this, 'CAMBIO_POSICION')">🔄 Cambio Posición<i class="act-time"></i></div>
                <div class="act-btn" onclick="registerActivity(this, 'MEDICAMENTOS')">💊 Medicamentos<i class="act-time"></i></div>
            </div>
        </div>

        <!-- MÓDULO: SIGNOS VITALES INTELIGENTES -->
        <div class="module-section">
            <h3>🩺 Signos Vitales y Escalas</h3>
            <div class="grid-2">
                <input type="number" placeholder="TA Sistólica">
                <input type="number" placeholder="TA Diastólica">
                <input type="number" placeholder="Frecuencia Cardíaca">
                
                <!-- SpO2 con Semáforo -->
                <div style="position: relative;">
                    <span id="spo2Light" class="spo2-indicator status-green"></span>
                    <input type="number" id="spo2Input" placeholder="SpO2 (%)" oninput="checkSpo2Alert()">
                </div>
                
                <input type="number" placeholder="Glucometría (mg/dL)">
                <input type="number" placeholder="Temperatura (°C)">
            </div>
            
            <div class="grid-2" style="margin-top: 15px;">
                <select><option>EVA Dolor (0-10)</option><option>0 - Sin dolor</option><option>10 - Dolor máximo</option></select>
                <select><option>Escala Glasgow</option><option>15 - Consciente</option><option>3 - Coma</option></select>
            </div>
            <button style="margin-top: 15px;">Guardar Registro Clínico</button>
        </div>
    </div>

    <script>
        // LÓGICA DEL SISTEMA
        function handleLogin() {
            // Simulación de login exitoso para probar la interfaz
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }

        function logout() { location.reload(); }

        // Dictado por Voz
        function startDictation() {
            if (window.hasOwnProperty('webkitSpeechRecognition')) {
                const recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.lang = "es-CO";
                recognition.start();
                
                recognition.onresult = function(e) {
                    document.getElementById('sbarNotes').value += e.results[0][0].transcript + " ";
                };
                recognition.onerror = function(e) { alert("Error de micrófono: " + e.message); };
            } else {
                alert("Tu navegador no soporta dictado por voz.");
            }
        }

        // Registro de Actividades con Hora
        function registerActivity(btn, type) {
            btn.classList.toggle('active');
            const timeSpan = btn.querySelector('.act-time');
            if (btn.classList.contains('active')) {
                const now = new Date();
                timeSpan.textContent = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
            } else {
                timeSpan.textContent = "";
            }
        }

        // Lógica de Altitud y SpO2
        let spo2Threshold = 97; // Por defecto Cúcuta/Costa
        function updateSpo2Logic() {
            spo2Threshold = document.getElementById('patientCity').value;
            checkSpo2Alert();
        }

        function checkSpo2Alert() {
            const val = document.getElementById('spo2Input').value;
            const light = document.getElementById('spo2Light');
            if (val && val < spo2Threshold) {
                light.className = "spo2-indicator status-red"; // Alarma
            } else {
                light.className = "spo2-indicator status-green"; // Normal
            }
        }
    </script>
</body>
</html>
