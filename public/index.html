<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Hogar Pro - Acceso Seguro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --primary: #22c55e; --danger: #ef4444; --warning: #f59e0b; --text-main: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; }
        .app-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .hidden { display: none !important; }
        
        /* Login */
        .login-wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: var(--card-bg); padding: 2.5rem; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
        .input-group { position: relative; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .toggle-password { position: absolute; right: 15px; top: 12px; cursor: pointer; color: #94a3b8; }
        
        /* UI General */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-radius: 12px; margin-bottom: 20px; }
        button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button.secondary { background: #334155; }
        button.danger { background: var(--danger); }
        
        /* Navegación Admin */
        .admin-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: #334155; width: auto; flex: 1; }
        .nav-btn.active { background: var(--primary); }

        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #0f172a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #1e293b; color: #94a3b8; }
        
        /* Canvas de Firma */
        .signature-wrapper { border: 2px dashed #334155; background: white; border-radius: 8px; overflow: hidden; touch-action: none; margin: 10px 0; position: relative; }
        canvas { display: block; width: 100%; height: 200px; cursor: crosshair; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen" class="login-wrapper">
        <div class="login-card">
            <img src="https://i.imgur.com/01YZxey.jpeg" style="height: 80px;">
            <h2>Acceso Vital Hogar</h2>
            <div class="input-group"><input type="email" id="loginEmail" placeholder="Correo Electrónico"></div>
            <div class="input-group"><input type="password" id="loginPass" placeholder="Contraseña"><i class="fas fa-eye toggle-password" onclick="togglePass()"></i></div>
            <button onclick="handleLogin()">Ingresar</button>
            <p id="loginMsg" style="color: var(--danger); margin-top: 10px;"></p>
        </div>
    </div>

    <!-- ADMIN VIEW -->
    <div id="adminView" class="app-container hidden">
        <header>
            <div class="logo-area"><img src="https://i.imgur.com/01YZxey.jpeg" style="height: 40px;"><h1>Panel Admin</h1></div>
            <button onclick="logout()" style="width: auto; background: var(--danger);">Salir</button>
        </header>

        <!-- Navegación Interna -->
        <div class="admin-nav">
            <button class="nav-btn active" onclick="showSection('profSection')">👨‍⚕️ Profesionales</button>
            <button class="nav-btn" onclick="showSection('patSection')">🤒 Pacientes</button>
        </div>

        <!-- SECCIÓN PROFESIONALES -->
        <div id="profSection">
            <div class="module-section" style="background: var(--card-bg); padding: 20px; border-radius: 12px;">
                <h3>Crear Nuevo Profesional</h3>
                <div class="form-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                    <input type="text" id="newProfName" placeholder="Nombre Completo">
                    <input type="text" id="newProfDoc" placeholder="Cédula">
                    <input type="email" id="newProfEmail" placeholder="Correo (Login)">
                    <input type="text" id="newProfPass" placeholder="Contraseña Temporal">
                    <select id="newProfSpec">
                        <option value="">Seleccionar Especialidad...</option>
                        <option value="ADMINISTRACION">Administración</option>
                        <option value="AUXILIAR_ENFERMERIA">Auxiliar de Enfermería</option>
                        <option value="ENFERMERIA_JEFE">Enfermero Jefe</option>
                        <option value="MEDICINA">Médico</option>
                    </select>
                    <input type="text" id="newProfExpiry" placeholder="Vencimiento RETHUS (AAAA-MM-DD)">
                </div>
                <h4 style="margin-top: 20px;">✍️ Firma Digital</h4>
                <div class="signature-wrapper"><canvas id="sigCanvas"></canvas></div>
                <button class="secondary" onclick="clearSig()" style="width: auto;">🗑️ Borrar Firma</button>
                <button onclick="createProfessional()">💾 Guardar Profesional</button>
            </div>
            
            <div class="module-section" style="background: var(--card-bg); padding: 20px; border-radius: 12px; margin-top: 20px;">
                <h3>Equipo Vital Hogar</h3>
                <table><thead><tr><th>Nombre</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="profListBody"></tbody></table>
            </div>
        </div>

        <!-- SECCIÓN PACIENTES -->
        <div id="patSection" class="hidden">
            <div class="module-section" style="background: var(--card-bg); padding: 20px; border-radius: 12px;">
                <h3>Registrar Nuevo Paciente</h3>
                <div class="form-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                    <input type="text" id="patName" placeholder="Nombre Completo del Paciente">
                    <input type="text" id="patDoc" placeholder="Cédula / Identificación">
                    <input type="date" id="patBirth">
                    <select id="patCity">
                        <option value="">Seleccionar Ciudad (Lógica SpO2)...</option>
                        <option value="Cúcuta">Cúcuta (Nivel 1)</option>
                        <option value="Barranquilla">Barranquilla (Nivel 1)</option>
                        <option value="Cali">Cali (Nivel 2)</option>
                        <option value="Medellín">Medellín (Nivel 3)</option>
                        <option value="Bogotá">Bogotá (Nivel 4)</option>
                    </select>
                    <input type="text" id="patPathology" placeholder="Resumen de Patología (Ej: Post-ACV)">
                    <input type="text" id="patAddress" placeholder="Dirección Completa">
                    <input type="text" id="patContact" placeholder="Celular Familiar Responsable">
                </div>
                <button onclick="createPatient()" style="margin-top: 15px;">💾 Registrar Paciente</button>
            </div>

            <div class="module-section" style="background: var(--card-bg); padding: 20px; border-radius: 12px; margin-top: 20px;">
                <h3>Cartera de Pacientes</h3>
                <table><thead><tr><th>Nombre</th><th>Ciudad</th><th>Patología</th><th>Contacto</th></tr></thead><tbody id="patListBody"></tbody></table>
            </div>
        </div>
    </div>

    <!-- AUXILIAR VIEW -->
    <div id="auxiliarView" class="app-container hidden">
        <header>
            <div class="logo-area"><img src="https://i.imgur.com/01YZxey.jpeg" style="height: 40px;"><h1>Mi Turno Activo</h1></div>
            <button onclick="logout()" style="width: auto; background: var(--danger);">Salir</button>
        </header>
        <div class="module-section" style="background: var(--card-bg); padding: 20px; border-radius: 12px; text-align: center;">
            <h3>Bienvenido, <span id="auxName"></span></h3>
            <p>Sistema listo para registro clínico.</p>
        </div>
    </div>

    <script>
        // --- LÓGICA DE LOGIN Y VISTAS ---
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const msg = document.getElementById('loginMsg');
            msg.textContent = "Conectando...";
            try {
                const res = await fetch('/api/auth/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email, password: pass }) });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    initApp();
                } else { msg.textContent = data.message; }
            } catch (e) { msg.textContent = "Error de conexión."; }
        }

        function initApp() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) return;
            document.getElementById('loginScreen').classList.add('hidden');
            if (user.specialties.name === 'ADMINISTRACION') {
                document.getElementById('adminView').classList.remove('hidden');
                initCanvas(); loadProfessionals();
            } else {
                document.getElementById('auxiliarView').classList.remove('hidden');
                document.getElementById('auxName').textContent = user.full_name;
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function togglePass() { const i = document.getElementById('loginPass'); i.type = i.type === 'password' ? 'text' : 'password'; }
        
        function showSection(id) {
            document.getElementById('profSection').classList.add('hidden');
            document.getElementById('patSection').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            if(id === 'patSection') loadPatients();
        }

        // --- CANVAS FIRMA ---
        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('sigCanvas');
            ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width; canvas.height = rect.height;
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e.touches[0]); });
            canvas.addEventListener('touchend', (e) => { e.preventDefault(); endDraw(); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
        }
        function getPos(e) { const rect = canvas.getBoundingClientRect(); return { x: e.clientX - rect.left, y: e.clientY - rect.top }; }
        function startDraw(e) { drawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
        function draw(e) { if (!drawing) return; const pos = getPos(e); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = 'black'; ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
        function endDraw() { drawing = false; }
        function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // --- GESTIÓN PROFESIONALES ---
        async function loadProfessionals() {
            const res = await fetch('/api/professionals');
            const data = await res.json();
            const tbody = document.getElementById('profListBody');
            tbody.innerHTML = '';
            data.data.forEach(p => {
                tbody.innerHTML += `<tr><td>${p.full_name}</td><td>${p.specialties.name}</td><td>${p.is_active ? '✅' : '❌'}</td><td><button class="secondary" style="width:auto; padding:5px;" onclick="toggleStatus('${p.id}', ${!p.is_active})">${p.is_active ? 'Desactivar' : 'Activar'}</button></td></tr>`;
            });
        }
        async function createProfessional() {
            const data = {
                fullName: document.getElementById('newProfName').value,
                documentNumber: document.getElementById('newProfDoc').value,
                email: document.getElementById('newProfEmail').value,
                password: document.getElementById('newProfPass').value,
                specialtyName: document.getElementById('newProfSpec').value,
                cardExpiry: document.getElementById('newProfExpiry').value,
                signature: canvas.toDataURL()
            };
            if(!data.email || !data.fullName) return alert("Faltan datos");
            const res = await fetch('/api/professionals', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            const result = await res.json();
            alert(result.message);
            if(result.success) { clearSig(); loadProfessionals(); }
        }
        async function toggleStatus(id, newStatus) {
            await fetch(`/api/professionals/${id}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ isActive: newStatus }) });
            loadProfessionals();
        }

        // --- GESTIÓN PACIENTES ---
        async function loadPatients() {
            const res = await fetch('/api/patients');
            const data = await res.json();
            const tbody = document.getElementById('patListBody');
            tbody.innerHTML = '';
            data.data.forEach(p => {
                tbody.innerHTML += `<tr><td>${p.full_name}</td><td>${p.altitude_profiles.city_name}</td><td>${p.pathology_summary || 'N/A'}</td><td>${p.contact_phone}</td></tr>`;
            });
        }
        async function createPatient() {
            const data = {
                fullName: document.getElementById('patName').value,
                documentNumber: document.getElementById('patDoc').value,
                birthDate: document.getElementById('patBirth').value,
                cityName: document.getElementById('patCity').value,
                pathology: document.getElementById('patPathology').value,
                address: document.getElementById('patAddress').value,
                contactPhone: document.getElementById('patContact').value
            };
            if(!data.fullName || !data.cityName) return alert("Nombre y Ciudad son obligatorios");
            const res = await fetch('/api/patients', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            const result = await res.json();
            alert(result.message);
            if(result.success) loadPatients();
        }

        window.onload = () => { if(localStorage.getItem('token')) initApp(); };
    </script>
</body>
</html>
