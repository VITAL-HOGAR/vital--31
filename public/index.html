<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Hogar Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --primary: #22c55e; --danger: #ef4444; --warning: #f59e0b; --text-main: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; }
        .app-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .hidden { display: none !important; }
        .login-wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: var(--card-bg); padding: 2.5rem; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-radius: 12px; margin-bottom: 20px; }
        button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button.secondary { background: #334155; }
        button.danger { background: var(--danger); }
        .admin-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: #334155; width: auto; flex: 1; }
        .nav-btn.active { background: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #0f172a; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-wrapper">
        <div class="login-card">
            <img src="https://i.imgur.com/01YZxey.jpeg" style="height: 80px;">
            <h2>Acceso Vital Hogar</h2>
            <input type="email" id="loginEmail" placeholder="Correo">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <button onclick="handleLogin()">Ingresar</button>
            <p id="loginMsg" style="color: var(--danger);"></p>
        </div>
    </div>

    <div id="adminView" class="app-container hidden">
        <header>
            <h1>Panel Admin</h1>
            <button onclick="logout()" style="width: auto; background: var(--danger);">Salir</button>
        </header>
        <div class="admin-nav">
            <button class="nav-btn active" onclick="showSection('profSection')">Profesionales</button>
            <button class="nav-btn" onclick="showSection('patSection')">Pacientes</button>
        </div>

        <div id="profSection">
            <h3>Crear Profesional</h3>
            <input type="text" id="newProfName" placeholder="Nombre">
            <input type="text" id="newProfDoc" placeholder="Cédula">
            <input type="email" id="newProfEmail" placeholder="Email">
            <input type="text" id="newProfPass" placeholder="Clave">
            <select id="newProfSpec"><option value="ADMINISTRACION">Admin</option><option value="AUXILIAR_ENFERMERIA">Auxiliar</option></select>
            <input type="text" id="newProfExpiry" placeholder="Vencimiento RETHUS">
            <button onclick="createProfessional()">Guardar</button>
            <table><thead><tr><th>Nombre</th><th>Rol</th><th>Acciones</th></tr></thead><tbody id="profListBody"></tbody></table>
        </div>

        <div id="patSection" class="hidden">
            <h3>Crear Paciente</h3>
            <input type="text" id="patName" placeholder="Nombre Paciente">
            <input type="text" id="patDoc" placeholder="Cédula">
            <select id="patCity"><option value="Cúcuta">Cúcuta</option><option value="Bogotá">Bogotá</option></select>
            <input type="text" id="patPathology" placeholder="Patología">
            <input type="text" id="patContact" placeholder="Celular Familiar">
            <button onclick="createPatient()">Guardar Paciente</button>
            <table><thead><tr><th>Nombre</th><th>Ciudad</th><th>Patología</th></tr></thead><tbody id="patListBody"></tbody></table>
        </div>
    </div>

    <div id="auxiliarView" class="app-container hidden">
        <header><h1>Mi Turno</h1><button onclick="logout()" style="width: auto; background: var(--danger);">Salir</button></header>
        <h3>Bienvenido, <span id="auxName"></span></h3>
    </div>

    <script>
        async function handleLogin() {
            const res = await fetch('/api/auth/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPass').value }) });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.data.user));
                initApp();
            } else { document.getElementById('loginMsg').textContent = data.message; }
        }

        function initApp() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) return;
            document.getElementById('loginScreen').classList.add('hidden');
            if (user.specialties.name === 'ADMINISTRACION') {
                document.getElementById('adminView').classList.remove('hidden');
                loadProfessionals();
            } else {
                document.getElementById('auxiliarView').classList.remove('hidden');
                document.getElementById('auxName').textContent = user.full_name;
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function showSection(id) {
            document.getElementById('profSection').classList.add('hidden');
            document.getElementById('patSection').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if(id === 'patSection') loadPatients();
        }

        async function loadProfessionals() {
            const res = await fetch('/api/professionals');
            const data = await res.json();
            document.getElementById('profListBody').innerHTML = data.data.map(p => `<tr><td>${p.full_name}</td><td>${p.specialties.name}</td><td><button class="danger" onclick="deleteProf('${p.id}')">X</button></td></tr>`).join('');
        }
        async function createProfessional() {
            await fetch('/api/professionals', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ fullName: document.getElementById('newProfName').value, documentNumber: document.getElementById('newProfDoc').value, email: document.getElementById('newProfEmail').value, password: document.getElementById('newProfPass').value, specialtyName: document.getElementById('newProfSpec').value, cardExpiry: document.getElementById('newProfExpiry').value, signature: 'temp' }) });
            loadProfessionals();
        }
        async function deleteProf(id) { await fetch(`/api/professionals/${id}`, { method: 'DELETE' }); loadProfessionals(); }

        async function loadPatients() {
            console.log("Cargando pacientes...");
            const res = await fetch('/api/patients');
            const data = await res.json();
            console.log("Datos recibidos:", data);
            const tbody = document.getElementById('patListBody');
            if (!data.data || data.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">No hay pacientes (Verifica Logs de Render)</td></tr>';
                return;
            }
            tbody.innerHTML = data.data.map(p => `<tr><td>${p.full_name}</td><td>${p.altitude_profiles?.city_name || 'N/A'}</td><td>${p.pathology_summary}</td></tr>`).join('');
        }

        async function createPatient() {
            const body = {
                fullName: document.getElementById('patName').value,
                documentNumber: document.getElementById('patDoc').value,
                cityName: document.getElementById('patCity').value,
                pathology: document.getElementById('patPathology').value,
                contactPhone: document.getElementById('patContact').value
            };
            console.log("Enviando paciente:", body);
            const res = await fetch('/api/patients', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            const result = await res.json();
            alert(result.message || result.error);
            if(result.success) loadPatients();
        }

        window.onload = () => { if(localStorage.getItem('user')) initApp(); };
    </script>
</body>
</html>
