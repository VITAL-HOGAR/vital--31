<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vital Hogar Pro - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --primary: #22c55e; --danger: #ef4444; --text-main: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .hidden { display: none; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        button { padding: 10px; background: var(--primary); color: white; border: none; cursor: pointer; margin-top: 10px; border-radius: 6px; font-weight: bold; }
        button:hover { opacity: 0.9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #0f172a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #1e293b; color: #94a3b8; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav button { background: #334155; width: auto; margin-top: 0; }
        .nav button.active { background: var(--primary); }
        
        /* Estilos para el ojo de la contraseña */
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 10px; top: 15px; cursor: pointer; color: #94a3b8; background: none; border: none; margin: 0; width: auto; padding: 0; }
        
        /* Estilos para el micrófono */
        .mic-wrapper { position: relative; display: flex; align-items: center; gap: 5px; }
        .mic-btn { background: #3b82f6; width: 40px; height: 40px; padding: 0; margin: 5px 0; display: flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0; }
        .mic-btn.recording { background: var(--danger); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="loginScreen" class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
        <!-- REEMPLAZA ESTE SRC CON EL LINK DIRECTO DE TU IMAGEN EN IMGUR (terminado en .jpg o .png) -->
        <img src="https://i.imgur.com/01YZxey.jpeg" alt="Logo Vital Hogar" style="height: 100px; margin-bottom: 20px; border-radius: 10px;">
        <h2>Acceso al Sistema</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <div class="password-wrapper">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="toggle-password" onclick="togglePass()"><i class="fas fa-eye"></i></button>
        </div>
        <button onclick="login()" style="width: 100%; margin-top: 20px;">Ingresar</button>
        <p id="msg" style="color: var(--danger); margin-top: 10px;"></p>
    </div>

    <!-- PANEL ADMIN -->
    <div id="adminPanel" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <div style="display:flex; align-items:center; gap: 15px;">
                <img src="https://i.imgur.com/01YZxey.jpeg" alt="Logo" style="height: 50px; border-radius: 8px;">
                <h1 style="margin:0;">Panel de Control</h1>
            </div>
            <button onclick="logout()" style="background:var(--danger); width:auto; margin:0;">Salir</button>
        </div>

        <div class="grid">
            <div class="card" style="text-align: center; border-left: 5px solid var(--primary);"><h3>Pacientes Activos</h3><h2 id="statPat" style="font-size: 2.5rem; color: var(--primary);">0</h2></div>
            <div class="card" style="text-align: center; border-left: 5px solid #3b82f6;"><h3>Profesionales</h3><h2 id="statProf" style="font-size: 2.5rem; color: #3b82f6;">0</h2></div>
        </div>

        <div class="nav">
            <button class="active" onclick="show('prof')"><i class="fas fa-user-md"></i> Profesionales</button>
            <button onclick="show('pat')"><i class="fas fa-user-injured"></i> Pacientes</button>
            <button onclick="show('edu')"><i class="fas fa-graduation-cap"></i> Educación</button>
        </div>

        <!-- PROFESIONALES -->
        <div id="profSection">
            <div class="card">
                <h3><i class="fas fa-user-plus"></i> Nuevo Profesional</h3>
                <div class="grid">
                    <input type="text" id="pName" placeholder="Nombre Completo">
                    <input type="text" id="pDoc" placeholder="Cédula">
                    <input type="email" id="pEmail" placeholder="Correo (para login)">
                    <input type="password" id="pPass" placeholder="Contraseña temporal">
                    <select id="pSpec">
                        <option value="AUXILIAR_ENFERMERIA">Auxiliar de Enfermería</option>
                        <option value="ENFERMERIA_JEFE">Enfermero Jefe</option>
                        <option value="MEDICINA">Médico</option>
                        <option value="FISIOTERAPIA">Fisioterapeuta</option>
                        <option value="NUTRICION">Nutricionista</option>
                        <option value="PSICOLOGIA">Psicólogo</option>
                    </select>
                </div>
                <p style="margin: 10px 0 5px; color: #94a3b8; font-size: 0.9rem;">Firma Digital:</p>
                <canvas id="sigCanvas" style="background: white; border: 2px dashed #334155; border-radius: 6px; width: 100%; height: 150px; cursor: crosshair;"></canvas>
                <button onclick="clearSig()" style="background: #334155; width: auto; margin-top: 5px;"><i class="fas fa-eraser"></i> Borrar Firma</button>
                <button onclick="createProf()" style="width: 100%;"><i class="fas fa-save"></i> Guardar Profesional</button>
            </div>
            <table id="profTable"><thead><tr><th>Nombre</th><th>Cédula</th><th>Rol</th><th>Estado</th></tr></thead><tbody></tbody></table>
        </div>

        <!-- PACIENTES -->
        <div id="patSection" class="hidden">
            <div class="card">
                <h3><i class="fas fa-user-plus"></i> Nuevo Paciente</h3>
                <h4 style="color: var(--primary); margin-bottom: 10px;">Datos del Paciente</h4>
                <div class="grid">
                    <input type="text" id="patName" placeholder="Nombre Completo">
                    <input type="text" id="patDoc" placeholder="Cédula">
                    <select id="patCity">
                        <option value="Bogotá">Bogotá (Nivel 4 - SpO2 93%)</option>
                        <option value="Medellín">Medellín (Nivel 3 - SpO2 95%)</option>
                        <option value="Cali">Cali (Nivel 2 - SpO2 96%)</option>
                        <option value="Cúcuta">Cúcuta (Nivel 1/2 - SpO2 96%)</option>
                        <option value="Barranquilla">Barranquilla (Nivel 1 - SpO2 97%)</option>
                    </select>
                    <div class="mic-wrapper">
                        <input type="text" id="patPath" placeholder="Patología / Diagnóstico">
                        <button class="mic-btn" onclick="startDictation('patPath')"><i class="fas fa-microphone"></i></button>
                    </div>
                    <input type="text" id="patAddr" placeholder="Dirección">
                </div>
                
                <h4 style="color: var(--danger); margin: 20px 0 10px;">Familiar Responsable (Legal)</h4>
                <div class="grid">
                    <input type="text" id="famName" placeholder="Nombre Completo del Familiar">
                    <input type="text" id="famId" placeholder="Cédula del Familiar">
                    <input type="text" id="famRel" placeholder="Parentesco (Ej: Hijo, Esposa)">
                    <input type="tel" id="famCel" placeholder="Celular de Contacto">
                </div>
                <button onclick="createPat()" style="width: 100%;"><i class="fas fa-save"></i> Guardar Paciente</button>
            </div>
            <table id="patTable"><thead><tr><th>Paciente</th><th>Ciudad</th><th>Familiar Responsable</th><th>Celular</th></tr></thead><tbody></tbody></table>
        </div>

        <!-- EDUCACIÓN -->
        <div id="eduSection" class="hidden">
            <div class="card">
                <h3><i class="fas fa-book"></i> Nuevo Tema Educativo</h3>
                <input type="text" id="eduTitle" placeholder="Título del Tema (Ej: Manejo de Sonda Nasogástrica)">
                <div class="mic-wrapper">
                    <textarea id="eduDesc" rows="3" placeholder="Descripción breve o instrucciones para el auxiliar..."></textarea>
                    <button class="mic-btn" onclick="startDictation('eduDesc')"><i class="fas fa-microphone"></i></button>
                </div>
                <select id="eduResp" style="margin-top: 10px;"><option>Cargando profesionales...</option></select>
                <button onclick="createEdu()" style="width: 100%;"><i class="fas fa-save"></i> Guardar Tema</button>
            </div>
            <table id="eduTable"><thead><tr><th>Tema</th><th>Responsable Asignado</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

    <script>
        // --- 1. LÓGICA DE LOGIN Y UI ---
        function togglePass() {
            const input = document.getElementById('pass');
            const icon = document.querySelector('.toggle-password i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const res = await fetch('/api/auth/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email, password: pass }) });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.data.user));
                initApp();
            } else { document.getElementById('msg').innerText = data.message; }
        }

        function initApp() {
            if (!localStorage.getItem('user')) return;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            initCanvas(); loadStats(); loadProfs(); loadEduResps();
        }

        function logout() { localStorage.clear(); location.reload(); }
        
        function show(id) {
            ['profSection', 'patSection', 'eduSection'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id + 'Section').classList.remove('hidden');
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            event.target.closest('button').classList.add('active');
            if(id === 'pat') loadPats();
            if(id === 'edu') loadEdus();
        }

        // --- 2. FIRMA DIGITAL ---
        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('sigCanvas');
            ctx = canvas.getContext('2d');
            // Ajustar tamaño real del canvas
            canvas.width = canvas.offsetWidth;
            canvas.height = 150;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            canvas.addEventListener('mousedown', () => drawing = true);
            canvas.addEventListener('mouseup', () => drawing = false);
            canvas.addEventListener('mousemove', (e) => {
                if (!drawing) return;
                const rect = canvas.getBoundingClientRect();
                ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = 'black';
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
            });
        }
        function clearSig() { 
            ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height); 
            ctx.beginPath();
        }

        // --- 3. RECONOCIMIENTO DE VOZ ---
        function startDictation(elementId) {
            if (window.hasOwnProperty('webkitSpeechRecognition')) {
                const recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'es-CO';
                
                const btn = document.querySelector(`button[onclick="startDictation('${elementId}')"]`);
                btn.classList.add('recording');

                recognition.start();

                recognition.onresult = function(e) {
                    const input = document.getElementById(elementId);
                    // Agrega el texto dictado al valor existente
                    input.value += (input.value ? ' ' : '') + e.results[0][0].transcript;
                    btn.classList.remove('recording');
                };

                recognition.onerror = function(e) {
                    console.error("Error de voz:", e);
                    btn.classList.remove('recording');
                    alert("No se pudo reconocer la voz. Verifica el micrófono.");
                };
                
                recognition.onend = function() {
                    btn.classList.remove('recording');
                };
            } else {
                alert("Tu navegador no soporta reconocimiento de voz. Usa Chrome.");
            }
        }

        // --- 4. GESTIÓN DE DATOS ---
        async function loadStats() {
            const res = await fetch('/api/dashboard/stats');
            const d = await res.json();
            if(d.success) {
                document.getElementById('statPat').innerText = d.data.patients || 0;
                document.getElementById('statProf').innerText = d.data.professionals || 0;
            }
        }

        async function loadProfs() {
            const res = await fetch('/api/professionals');
            const d = await res.json();
            document.querySelector('#profTable tbody').innerHTML = d.data.map(p => 
                `<tr><td>${p.full_name}</td><td>${p.document_number}</td><td>${p.specialties?.name || 'N/A'}</td><td>${p.is_active ? '✅ Activo' : '❌ Inactivo'}</td></tr>`
            ).join('');
        }

        async function createProf() {
            const payload = {
                fullName: document.getElementById('pName').value,
                documentNumber: document.getElementById('pDoc').value,
                email: document.getElementById('pEmail').value,
                password: document.getElementById('pPass').value,
                specialtyName: document.getElementById('pSpec').value,
                signature: canvas.toDataURL()
            };
            const res = await fetch('/api/professionals', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const d = await res.json();
            alert(d.message);
            if(d.success) { clearSig(); loadProfs(); loadStats(); loadEduResps(); }
        }

        async function loadPats() {
            const res = await fetch('/api/patients');
            const d = await res.json();
            document.querySelector('#patTable tbody').innerHTML = d.data.map(p => 
                `<tr><td>${p.full_name}</td><td>${p.city_id ? 'Asignada' : 'N/A'}</td><td>${p.family_name} (${p.family_relationship})</td><td>${p.contact_phone}</td></tr>`
            ).join('');
        }

        async function createPat() {
            const payload = {
                fullName: document.getElementById('patName').value,
                documentNumber: document.getElementById('patDoc').value,
                cityName: document.getElementById('patCity').value,
                pathology: document.getElementById('patPath').value,
                address: document.getElementById('patAddr').value,
                familyName: document.getElementById('famName').value,
                familyId: document.getElementById('famId').value,
                familyRel: document.getElementById('famRel').value,
                contactPhone: document.getElementById('famCel').value
            };
            const res = await fetch('/api/patients', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const d = await res.json();
            alert(d.message);
            if(d.success) { loadPats(); loadStats(); }
        }

        async function loadEduResps() {
            const res = await fetch('/api/professionals');
            const d = await res.json();
            document.getElementById('eduResp').innerHTML = d.data.map(p => `<option value="${p.id}">${p.full_name} (${p.specialties?.name})</option>`).join('');
        }

        async function loadEdus() {
            const res = await fetch('/api/education/topics');
            const d = await res.json();
            document.querySelector('#eduTable tbody').innerHTML = d.data.map(t => `<tr><td>${t.title}</td><td>${t.professionals?.full_name || 'N/A'}</td></tr>`).join('');
        }

        async function createEdu() {
            const payload = {
                title: document.getElementById('eduTitle').value,
                description: document.getElementById('eduDesc').value,
                responsibleId: document.getElementById('eduResp').value
            };
            const res = await fetch('/api/education/topics', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const d = await res.json();
            alert(d.message);
            if(d.success) loadEdus();
        }

        window.onload = initApp;
    </script>
</body>
</html>
