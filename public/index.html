<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Hogar Pro IPS - Gestión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --primary: #22c55e; --text-main: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; }
        .app-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-radius: 12px; margin-bottom: 20px; }
        .logo-area img { height: 50px; }
        
        /* Formularios Responsive */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        /* Canvas de Firma (Responsive) */
        .signature-container { background: white; border-radius: 8px; overflow: hidden; touch-action: none; }
        canvas { width: 100%; height: 200px; cursor: crosshair; }
        
        /* Botones */
        button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button.secondary { background: #334155; }
        
        /* Login */
        .login-wrapper { display: flex; justify-content: center; align-items: center; height: 90vh; }
        .login-card { background: var(--card-bg); padding: 2rem; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <!-- LOGIN SIMPLIFICADO -->
    <div id="loginScreen" class="login-wrapper">
        <div class="login-card">
            <img src="https://i.imgur.com/01YZxey.jpeg" style="height: 80px;">
            <h2>Acceso Vital Hogar</h2>
            <input type="email" id="loginEmail" placeholder="Email" value="admin@vitalhogar.com">
            <input type="password" id="loginPass" placeholder="Contraseña" value="123456">
            <button onclick="handleLogin()">Ingresar como ADMIN</button>
        </div>
    </div>

    <!-- PANEL DE ADMINISTRACIÓN -->
    <div id="adminPanel" class="app-container hidden">
        <header>
            <div class="logo-area">
                <img src="https://i.imgur.com/01YZxey.jpeg">
                <div><h1>Gestión de Profesionales</h1><small>Registro y Firmas Digitales</small></div>
            </div>
            <button onclick="logout()" style="width: auto; background: #ef4444;">Salir</button>
        </header>

        <div class="module-section" style="background: var(--card-bg); padding: 20px; border-radius: 12px;">
            <h3>👨‍⚕️ Nuevo Profesional / Auxiliar</h3>
            
            <div class="form-grid">
                <input type="text" id="profName" placeholder="Nombre Completo">
                <input type="text" id="profDoc" placeholder="Cédula de Ciudadanía">
                <select id="profSpecialty">
                    <option value="">Seleccionar Especialidad...</option>
                    <option value="AUXILIAR_ENFERMERIA">Auxiliar de Enfermería</option>
                    <option value="ENFERMERIA">Enfermero Jefe</option>
                    <option value="MEDICINA">Médico General</option>
                    <option value="FISIOTERAPIA">Fisioterapeuta</option>
                    <option value="NUTRICION">Nutricionista</option>
                </select>
                <input type="text" id="profCard" placeholder="Tarjeta Profesional / RETHUS">
            </div>

            <h4 style="margin-top: 20px;">✍️ Captura de Firma Digital</h4>
            <p style="font-size: 0.9rem; color: #94a3b8;">Dibuja la firma aquí (funciona con mouse o dedo en tablet/celular):</p>
            
            <div class="signature-container">
                <canvas id="sigCanvas"></canvas>
            </div>
            <button class="secondary" onclick="clearSignature()" style="width: auto; margin-top: 5px;">🗑️ Borrar Firma</button>

            <button onclick="saveProfessional()" style="margin-top: 20px; font-size: 1.1rem;">💾 Guardar Profesional en Base de Datos</button>
        </div>
    </div>

    <script>
        // --- LÓGICA DE LOGIN ---
        function handleLogin() {
            // Simulación: En producción esto valida con Supabase
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            initCanvas(); // Iniciar el canvas al entrar
        }

        function logout() { location.reload(); }

        // --- LÓGICA DEL CANVAS DE FIRMA (TOUCH & MOUSE) ---
        let canvas, ctx, drawing = false;

        function initCanvas() {
            canvas = document.getElementById('sigCanvas');
            ctx = canvas.getContext('2d');
            
            // Ajustar tamaño real del canvas
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            // Eventos Mouse
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mousemove', draw);
            
            // Eventos Touch (Celulares/Tablets)
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e.touches[0]); });
            canvas.addEventListener('touchend', (e) => { e.preventDefault(); endDraw(); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
        }

        function startDraw(e) {
            drawing = true;
            ctx.beginPath();
            const rect = canvas.getBoundingClientRect();
            ctx.moveTo((e.clientX || e.pageX) - rect.left, (e.clientY || e.pageY) - rect.top);
        }

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = 'black';
            ctx.lineTo((e.clientX || e.pageX) - rect.left, (e.clientY || e.pageY) - rect.top);
            ctx.stroke();
        }

        function endDraw() { drawing = false; }
        function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // --- GUARDAR PROFESIONAL ---
        function saveProfessional() {
            const name = document.getElementById('profName').value;
            if(!name) return alert("Falta el nombre");

            // Convertir firma a imagen Base64
            const signatureData = canvas.toDataURL();
            
            console.log("Guardando:", { name, signature: signatureData.substring(0, 50) + "..." });
            alert(`✅ Profesional ${name} guardado exitosamente con firma digital.`);
            
            // Aquí iría el fetch a tu backend para guardar en Supabase
            clearSignature();
            document.getElementById('profName').value = "";
        }
    </script>
</body>
</html>
