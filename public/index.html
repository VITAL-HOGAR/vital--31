<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vital Hogar - Prueba</title>
    <style>body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; } input { padding: 10px; margin: 5px; } button { padding: 10px; background: #22c55e; color: white; border: none; }</style>
</head>
<body>
    <img src="https://i.imgur.com/01YZxey.jpeg" style="height:80px;">
    <h2>Prueba de Acceso</h2>
    <input type="email" id="e" value="admin@vitalhogar.com"><br>
    <input type="password" id="p" value="123456"><br><br>
    <button onclick="test()">Probar Login</button>
    <p id="r"></p>

    <script>
        async function test() {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: document.getElementById('e').value, password: document.getElementById('p').value })
            });
            const data = await res.json();
            document.getElementById('r').innerText = JSON.stringify(data);
        }
    </script>
</body>
</html>
